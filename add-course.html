<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Course Management</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <h1>Course Management System</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">My Courses</a></li>
            <li><a href="add-course.html">Add Course</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
    
    <main>
        <section>
            <h2>Add New Course</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="course-name">Course Name</label>
                    <input type="text" id="course-name" name="course-name" required>
                </div>
                
                <div class="form-group">
                    <label for="instructor">Instructor</label>
                    <input type="text" id="instructor" name="instructor" required>
                </div>
                
                <div class="form-group">
                    <label for="credit-hours">Credit Hours</label>
                    <input type="number" id="credit-hours" name="credit-hours" min="1" max="6" required>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" rows="5"></textarea>
                </div>
                
                <div class="form-group">
                    <input type="submit" value="Add Course">
                </div>
            </form>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 Course Management System. All rights reserved.</p>
    </footer>
</body>
</html>
